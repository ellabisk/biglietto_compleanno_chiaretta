name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # o "master" se usi quel branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # pubblica tutto il repo; cambia con './docs' se i file sono in una sottocartella

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4